<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vincentius Workstation</title>
    <style>
        :root { --bg: #000; --header-bg: #fff; --accent: #10b981; }
        
        body { 
            margin: 0; 
            background: var(--bg); 
            display: flex; 
            flex-direction: column; 
            height: 100vh; /* Lock to screen height */
            font-family: ui-monospace, Menlo, monospace; 
            overflow: hidden; 
        }

        /* 1. Header: Fixed Height */
        .status-header { 
            flex: 0 0 45px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 0 24px; 
            background: var(--header-bg); 
            font-size: 11px; 
            font-weight: 800; 
            z-index: 10;
        }

        #rom-active { color: var(--accent); text-transform: uppercase; }

        /* 2. Viewport: THE VOID KILLER */
        .viewport { 
            flex: 1; /* Takes ALL available space between header and footer */
            display: flex; 
            align-items: center; 
            justify-content: center; 
            background: #000; 
            position: relative;
            padding: 20px; /* Slight padding so it doesn't touch edges */
        }

        .screen-frame { 
            /* This is the magic part: it fills height, and width follows the ratio */
            height: 100%;
            width: auto;
            aspect-ratio: 2 / 1; 
            display: flex;
            align-items: center;
            justify-content: center;
        }

        canvas { 
            width: 100% !important; 
            height: 100% !important; 
            image-rendering: pixelated; /* Keeps it sharp */
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
        }

        /* 3. Footer: Fixed Height Legend */
        .technical-footer { 
            flex: 0 0 140px; /* Precise height for your legend rows */
            background: #0a0a0a; 
            border-top: 1px solid #1a1a1a; 
            padding: 15px 30px; 
            display: flex; 
            justify-content: space-between; 
        }

        .section-label { font-size: 9px; color: #555; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.1em; }
        .key-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; font-size: 11px; color: #888; }
        .sys-key { color: #fff; font-weight: 800; background: #222; padding: 3px 8px; border-radius: 3px; min-width: 25px; text-align: center; border: 1px solid #333; }
        .highlight { color: var(--accent); font-weight: bold; }
    </style>
</head>
<body>

    <header class="status-header">
        <div>VINCENTIUS WORKSTATION <span style="font-weight:400; color:#888; margin-left:8px;">CORE_V1.24</span></div>
        <div>ROM: <span id="rom-active">BOOTING...</span></div>
        <div>ENGINE: 64X32_XOR</div>
    </header>

    <main class="viewport">
        <div class="screen-frame">
            <canvas id="canvas"></canvas>
        </div>
    </main>

    <footer class="technical-footer">
        <div>
            <div class="section-label">PC Controls (Movement)</div>
            <div class="key-row"><span class="sys-key">W</span> <span class="sys-key">↑</span> <span class="highlight">UP</span></div>
            <div class="key-row"><span class="sys-key">A</span> <span class="sys-key">←</span> <span class="highlight">LEFT</span></div>
            <div class="key-row"><span class="sys-key">S</span> <span class="sys-key">↓</span> <span class="highlight">DOWN</span></div>
            <div class="key-row"><span class="sys-key">D</span> <span class="sys-key">→</span> <span class="highlight">RIGHT</span></div>
        </div>

        <div>
            <div class="section-label">Actions</div>
            <div class="key-row"><span class="sys-key">SPACE</span> <span class="highlight">FIRE / ACTION</span></div>
            <div class="key-row"><span class="sys-key">Q / E</span> <span>ALT ACTIONS</span></div>
        </div>

        <div>
            <div class="section-label">System Commands</div>
            <div class="key-row"><span class="sys-key">P</span> <span>PAUSE ENGINE</span></div>
            <div class="key-row"><span class="sys-key">N</span> <span>CYCLE ROM (NEXT)</span></div>
            <div class="key-row"><span class="sys-key">ESC</span> <span>EXIT WORKSTATION</span></div>
        </div>
    </footer>

    <script src="wasm_glue_v1.js"></script>
    <script>
        window.updateRomName = (name) => {
            const el = document.getElementById("rom-active");
            if (el) el.innerText = name.replace('.ch8', '').toUpperCase();
        };

        const go = new Go();
        WebAssembly.instantiateStreaming(fetch("main.wasm"), go.importObject).then((result) => {
            go.run(result.instance);
        });
    </script>
</body>
</html>
