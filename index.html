<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHIP-8 Workstation</title>
    <style>
        :root { 
            --bg: #fdfdfd; 
            --accent: #22c55e;
            --border: #e5e7eb;
            --text-main: #111827;
            --text-dim: #6b7280;
        }
        
        body {
            background: var(--bg);
            color: var(--text-main);
            font-family: ui-monospace, 'Cascadia Code', 'Source Code Pro', Menlo, monospace;
            display: flex;
            flex-direction: column;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Top Status Bar */
        .status-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 24px;
            background: #fff;
            border-bottom: 1px solid var(--border);
            font-size: 13px;
            font-weight: 600;
            letter-spacing: -0.01em;
        }

        .status-group { display: flex; gap: 24px; }
        .label { color: var(--text-dim); margin-right: 8px; font-weight: 400; }
        #rom-active { color: var(--accent); text-transform: uppercase; }

        /* Main Viewport */
        .viewport {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .screen-container {
            width: 100%;
            max-width: 960px; /* Large, but contained */
            aspect-ratio: 2 / 1;
            background: #000;
            border-radius: 8px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            overflow: hidden;
            border: 1px solid #000;
        }

        canvas {
            width: 100% !important;
            height: 100% !important;
            image-rendering: pixelated;
            display: block;
        }
    </style>
</head>
<body>

    <header class="status-header">
        <div class="status-group">
            <div><span class="label">SYSTEM</span>CORE_V1.24</div>
            <div><span class="label">STATUS</span><span style="color: var(--accent)">● ACTIVE</span></div>
        </div>
        <div class="status-group">
            <div><span class="label">ROM_LOADED</span><span id="rom-active">BOOT_KERNEL</span></div>
            <div><span class="label">ENGINE</span>64X32_XOR</div>
        </div>
    </header>

    <main class="viewport">
        <div class="screen-container">
            <canvas id="canvas"></canvas>
        </div>
    </main>

    <script src="wasm_glue_v1.js"></script>
    <script>
        const go = new Go();
        WebAssembly.instantiateStreaming(fetch("main.wasm"), go.importObject).then((result) => {
            go.run(result.instance);
        });

        window.updateRomName = (name) => {
            const el = document.getElementById("rom-active");
            if (el) el.innerText = name.replace('.ch8', '').toUpperCase();
        };
    </script>
</body>
</html>
