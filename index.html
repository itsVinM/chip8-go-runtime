<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHIP-8 Go Runtime</title>
    <style>
        :root { 
            --bg: #050505; 
            --panel: #111114;
            --accent: #4ade80; 
            --border: #222;
            --text: #a1a1aa; 
        }
        
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Menlo', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start; /* Pinned to top */
            height: 100vh;
            margin: 0;
            padding-top: 20px; /* Slight breathing room at the very top */
        }

        /* Container for everything */
        .emulator-setup {
            display: flex;
            flex-direction: column;
            width: 640px; /* Matches 10x upscale */
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
        }

        /* THE PRIORITY: CANVAS AT THE TOP */
        canvas {
            display: block;
            background: #000;
            image-rendering: pixelated;
            border: 1px solid var(--border);
            border-bottom: none; /* Merges into the status bar */
        }

        #loading {
            width: 640px;
            height: 320px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            color: var(--accent);
            border: 1px solid var(--border);
        }

        /* STATUS & METADATA BELOW */
        .console-metadata {
            background: var(--panel);
            border: 1px solid var(--border);
            padding: 12px 15px;
            font-size: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #rom-name { 
            color: var(--accent); 
            font-weight: bold;
            text-transform: uppercase;
        }

        .sys-info {
            color: #444;
            font-size: 10px;
            letter-spacing: 1px;
        }

        /* CONTROLS AT THE BOTTOM */
        .console-footer {
            background: #0a0a0c;
            border: 1px solid var(--border);
            border-top: none;
            padding: 10px 15px;
            font-size: 11px;
            display: flex;
            justify-content: space-between;
            color: #555;
        }

        b { color: #888; font-weight: normal; }
    </style>
</head>
<body>

    <div class="emulator-setup">
        <div id="loading">SYSTEM_BOOT_SEQUENCE...</div>
        
        <div class="console-metadata">
            <div>
                $ EXEC --ROM: <span id="rom-name">INIT_KERNEL</span>
            </div>
            <div class="sys-info">64X32_XOR_ENGINE</div>
        </div>

        <div class="console-footer">
            <div>
                MAP: <b>1-4 Q-R A-F Z-V</b>
            </div>
            <div>
                <b>P</b> PAUSE | <b>N</b> NEXT | <b>SPACE</b> STEP
            </div>
        </div>
    </div>

    <script src="wasm_exec.js"></script>
    <script>
        window.updateRomName = (name) => {
            const cleanName = name.replace('.ch8', '');
            document.getElementById("rom-name").innerText = cleanName;
        };

        const go = new Go();
        WebAssembly.instantiateStreaming(fetch("main.wasm"), go.importObject).then((result) => {
            document.getElementById("loading").remove(); 
            go.run(result.instance);
        }).catch((err) => {
            console.error(err);
            document.getElementById("loading").innerText = "FAULT: CORE_DUMP";
        });
    </script>
</body>
</html>
