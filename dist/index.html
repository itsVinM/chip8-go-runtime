<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHIP-8 Go Runtime</title>
    <style>
        :root { 
            --bg: #050505; 
            --header-bg: #ffffff;
            --accent: #22c55e;
            --border: #e5e7eb;
            --text-main: #111827;
            --text-dim: #6b7280;
        }
        
        body {
            background: var(--bg);
            color: var(--text-main);
            font-family: ui-monospace, 'Cascadia Code', Menlo, monospace;
            display: flex;
            flex-direction: column;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Top Status Bar */
        .status-header {
            flex: 0 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 24px;
            background: var(--header-bg);
            border-bottom: 1px solid var(--border);
            font-size: 13px;
            font-weight: 700;
            z-index: 10;
        }

        #rom-active { color: var(--accent); }

        /* Main Viewport Container */
        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start; /* Reclaim vertical space */
            background: #000;
        }

        /* Scaled Emulator Frame */
        .screen-frame {
            width: 100%;
            max-width: 1000px;
            aspect-ratio: 2 / 1;
            background: #000;
            border-bottom: 1px solid #222;
        }

        canvas {
            width: 100% !important;
            height: 100% !important;
            image-rendering: pixelated;
        }

        /* Technical Legend Footer */
        .legend-footer {
            width: 100%;
            background: #fff;
            padding: 20px 40px;
            box-sizing: border-box;
            border-top: 1px solid var(--border);
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 40px;
        }

        .legend-section h4 {
            margin: 0 0 10px 0;
            font-size: 11px;
            color: var(--text-dim);
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .key-map {
            display: grid;
            grid-template-columns: 40px 1fr;
            font-size: 12px;
            gap: 4px;
            line-height: 1.6;
        }

        .key { font-weight: 800; color: var(--text-main); }
        .val { color: var(--text-dim); }
    </style>
</head>
<body>

    <header class="status-header">
        <div>SYSTEM: CORE_V1.24</div>
        <div>ROM_LOADED: <span id="rom-active">BOOTING...</span></div>
        <div>ENGINE: 64X32_XOR</div>
    </header>

    <main class="main-container">
        <div class="screen-frame">
            <canvas id="canvas"></canvas>
        </div>
        
        <footer class="legend-footer">
            <div class="legend-section">
                <h4>Movement Mapping</h4>
                <div class="key-map">
                    <span class="key">2</span> <span class="val">UP / P1 UP</span>
                    <span class="key">4</span> <span class="val">LEFT</span>
                    <span class="key">6</span> <span class="val">RIGHT</span>
                    <span class="key">8</span> <span class="val">DOWN / P1 DOWN</span>
                </div>
            </div>

            <div class="legend-section">
                <h4>Action Mapping</h4>
                <div class="key-map">
                    <span class="key">5</span> <span class="val">FIRE / ACTION</span>
                    <span class="key">F</span> <span class="val">START / RESET</span>
                    <span class="key">7 / 9</span> <span class="val">P2 UP / DOWN</span>
                </div>
            </div>

            <div class="legend-section">
                <h4>System Keys</h4>
                <div class="key-map">
                    <span class="key">P</span> <span class="val">PAUSE EMULATION</span>
                    <span class="key">N</span> <span class="val">NEXT STEP (DEBUG)</span>
                    <span class="key">SPACE</span> <span class="val">RESET CORE</span>
                </div>
            </div>
        </footer>
    </main>

    <script src="wasm_glue_v1.js"></script>
    <script>
        window.updateRomName = (name) => {
            document.getElementById("rom-active").innerText = name.toUpperCase();
        };

        const go = new Go();
        WebAssembly.instantiateStreaming(fetch("main.wasm"), go.importObject).then((result) => {
            go.run(result.instance);
        });
    </script>
</body>
</html>
