<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CHIP-8 Runtime Workstation</title>
    <style>
        body { margin: 0; background: #000; display: flex; height: 100vh; overflow: hidden; justify-content: center; align-items: center; }
        /* Container matches Go Layout (768 + 300) x 384 */
        .container { width: 1068px; height: 384px; }
        canvas { width: 100% !important; height: 100% !important; image-rendering: pixelated; outline: none; }
    </style>
</head>
<body onclick="document.getElementById('canvas').focus()">
    <div class="container">
        <canvas id="canvas" tabindex="1"></canvas>
    </div>
    <script src="wasm_glue_v1.js"></script>
    <script>
        (function() {
            const go = new Go();
            WebAssembly.instantiateStreaming(fetch("main.wasm"), go.importObject).then((res) => {
                go.run(res.instance);
                document.getElementById('canvas').focus();
            });
        })();
    </script>
</body>
</html>
