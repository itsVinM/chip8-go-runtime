<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHIP-8 Go Runtime | Console</title>
    <style>
        :root { 
            --bg: #0a0a0c; 
            --panel: #141417;
            --accent: #4ade80; 
            --border: #2d2d30;
            --text: #d4d4d8; 
        }
        
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Menlo', 'Monaco', 'Courier New', monospace;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .terminal-window {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 6px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            width: 640px; /* Force width to match upscaled 64x32 canvas */
            overflow: hidden;
        }

        .window-header {
            background: #1e1e22;
            padding: 10px 15px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .window-dots { display: flex; gap: 6px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: #333; }
        .dot.red { background: #ff5f56; }

        .window-title {
            font-size: 11px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .console-status {
            padding: 10px 15px;
            font-size: 12px;
            background: #16161a;
            border-bottom: 1px solid var(--border);
            color: #666;
        }
        #rom-name { color: var(--accent); }

        /* The canvas will land here */
        canvas {
            display: block;
            image-rendering: pixelated;
        }

        .console-footer {
            padding: 12px 15px;
            font-size: 11px;
            color: #666;
            background: #16161a;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
        }

        b { color: var(--text); font-weight: normal; }
        .key-hint { color: #444; margin-right: 5px; }

        #loading {
            padding: 100px 0;
            text-align: center;
            color: var(--accent);
            background: #000;
        }
    </style>
</head>
<body>

    <div class="terminal-window">
        <div class="window-header">
            <div class="window-dots">
                <div class="dot red"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
            <div class="window-title">System Runtime v1.0</div>
            <div style="width: 32px"></div> 
        </div>

        <div class="console-status">
            $ EXEC --ROM: <span id="rom-name">LOADING_KERNEL...</span>
        </div>

        <div id="loading">Initializing WebAssembly Instance...</div>
        
        <div class="console-footer">
            <div>
                <span class="key-hint">MAP:</span><b>1-4 Q-R A-F Z-V</b>
            </div>
            <div>
                <b>P</b> PAUSE | <b>N</b> NEXT | <b>SPACE</b> STEP
            </div>
        </div>
    </div>

    <script src="wasm_exec.js"></script>
    <script>
        window.updateRomName = (name) => {
            const cleanName = name.replace('.ch8', '').toUpperCase();
            document.getElementById("rom-name").innerText = cleanName;
        };

        const go = new Go();
        WebAssembly.instantiateStreaming(fetch("main.wasm"), go.importObject).then((result) => {
            // Remove the loading div entirely so the canvas takes its place
            document.getElementById("loading").remove(); 
            go.run(result.instance);
        }).catch((err) => {
            console.error("WASM Failure:", err);
            document.getElementById("loading").innerText = "FAULT: ACCESS_VIOLATION";
        });
    </script>
</body>
</html>
