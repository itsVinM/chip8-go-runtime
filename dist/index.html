<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CHIP-8 Go Runtime</title>
    <style>
        :root { --bg: #000; --accent: #10b981; --panel: #0a0a0a; --dim: #555; }
        body { margin: 0; background: var(--bg); display: flex; flex-direction: column; height: 100vh; overflow: hidden; font-family: ui-monospace, monospace; }

        /* 1. Full-Command Header */
        .technical-header {
            flex: 0 0 auto;
            background: var(--panel);
            border-bottom: 1px solid #1a1a1a;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status-box { font-size: 10px; font-weight: 800; color: #fff; line-height: 1.4; }
        #rom-active { color: var(--accent); text-transform: uppercase; }

        .legend-grid { display: grid; grid-template-columns: repeat(4, auto); gap: 4px 15px; }
        .key-row { display: flex; align-items: center; gap: 6px; font-size: 9px; color: var(--dim); }
        .sys-key { color: #fff; font-weight: 800; background: #1a1a1a; padding: 1px 4px; border-radius: 2px; border: 1px solid #333; min-width: 15px; text-align: center; }
        .hl { color: var(--accent); }

        /* 2. Viewport: Fill remaining space */
        .viewport { flex: 1; display: flex; align-items: center; justify-content: center; background: #000; padding: 10px; }
        .screen-frame { height: 100%; aspect-ratio: 2 / 1; display: flex; align-items: center; justify-content: center; }
        canvas { width: 100% !important; height: 100% !important; image-rendering: pixelated; }
    </style>
</head>
<body>

    <header class="technical-header">
        <div class="status-box">
            <div>CHIP-8 <span class="hl">GO RUNTIME</span></div>
            <div>ROM: <span id="rom-active">BOOTING...</span></div>
            <div style="color:var(--dim)">VER: 1.24</div>
        </div>

        <div class="legend-grid">
            <div class="key-row"><span class="sys-key">1-4</span> <span>0x1-0xC</span></div>
            <div class="key-row"><span class="sys-key">Q-R</span> <span>0x4-0xD</span></div>
            <div class="key-row"><span class="sys-key">A-F</span> <span>0x7-0xE</span></div>
            <div class="key-row"><span class="sys-key">Z-V</span> <span>0xA-0xF</span></div>
            
            <div class="key-row"><span class="sys-key">WASD</span> <span class="hl">MOV</span></div>
            <div class="key-row"><span class="sys-key">SPACE</span> <span class="hl">FIRE</span></div>
            <div class="key-row"><span class="sys-key">P</span> PAUSE</div>
            <div class="key-row"><span class="sys-key">N</span> NEXT</div>
        </div>
    </header>

    <main class="viewport">
        <div class="screen-frame"><canvas id="canvas"></canvas></div>
    </main>

    <script src="wasm_glue_v1.js"></script>
    <script>
        window.updateRomName = (name) => {
            const el = document.getElementById("rom-active");
            if (el) el.innerText = name.replace('.ch8', '').toUpperCase();
        };
        const go = new Go();
        WebAssembly.instantiateStreaming(fetch("main.wasm"), go.importObject).then((result) => { go.run(result.instance); });
    </script>
</body>
</html>
