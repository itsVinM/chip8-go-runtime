name: Build and Deploy WASM

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🏁
        uses: actions/checkout@v4

      - name: Setup Go 🐹
        uses: actions/setup-go@v4
        with:
          go-version: '1.22'
      - name: Build 🏗️
        run: |
          # 1. Create a clean staging area
          mkdir -p staging
          
          # 2. Build the WASM (Airplane is now inside this)
          GOOS=js GOARCH=wasm go build -o staging/main.wasm main.go
          
          # 3. Fetch the glue script
          curl -L https://raw.githubusercontent.com/golang/go/master/misc/wasm/wasm_exec.js -o staging/wasm_exec.js
          
          # 4. Copy YOUR index.html from its source location to staging
          # Based on your tree, it is in 'dist/index.html'
          cp dist/index.html staging/
          
          # 5. Copy the ROMs so the relative 'rom/' path works
          cp -r rom staging/

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: staging
          branch: gh-pages