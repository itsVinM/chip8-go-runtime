name: Build and Deploy WASM

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🏁
        uses: actions/checkout@v4

      - name: Setup Go 🐹
        uses: actions/setup-go@v4
        with:
          go-version: '1.22'
      - name: Build 🏗️
        run: |
          mkdir -p staging
          
          # 1. Build the WASM
          GOOS=js GOARCH=wasm go build -o staging/main.wasm main.go
          
          # 2. Fetch the glue script directly from the Go source for 1.22
          # This ensures version compatibility without hunting for local paths
          curl -L https://raw.githubusercontent.com/golang/go/release-branch.go1.22/misc/wasm/wasm_exec.js -o staging/wasm_exec.js
          
          # 3. Copy your assets
          # Make sure 'dist/index.html' actually exists in your repo
          cp dist/index.html staging/
          cp -r rom staging/

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: staging
          branch: gh-pages