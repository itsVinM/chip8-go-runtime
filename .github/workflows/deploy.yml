      name: Build and Deploy WASM

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🏁
        uses: actions/checkout@v4

      - name: Setup Go 🐹
        uses: actions/setup-go@v4
        with:
          go-version: '1.24' 
      - name: Build 🏗️
        run: |
          mkdir -p stage
          
          # 1. Build the WASM
          GOOS=js GOARCH=wasm go build -o stage/main.wasm main.go
          
          curl -L https://raw.githubusercontent.com/golang/go/release-branch.go1.24/misc/wasm/wasm_exec.js -o stage/wasm_exec.js 
          cp dist/index.html stage/
          cp -r rom stage/

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: stage
          branch: gh-pages

 