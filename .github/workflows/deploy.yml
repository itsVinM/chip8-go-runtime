name: Build and Deploy WASM

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🏁
        uses: actions/checkout@v4

      - name: Setup Go 🐹
        uses: actions/setup-go@v4
        with:
          go-version: '1.22'
      - name: Build 🏗️
        run: |
          mkdir -p staging
          # Build the WASM
          GOOS=js GOARCH=wasm go build -o staging/main.wasm main.go
          
          # USE THE SYSTEM FILE (Don't use curl)
          cp "$(go env GOROOT)/misc/wasm/wasm_exec.js" staging/
          
          # Copy assets
          cp dist/index.html staging/
          cp -r rom staging/

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: staging
          branch: gh-pages