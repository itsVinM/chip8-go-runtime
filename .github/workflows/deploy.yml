name: Build and Deploy WASM

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🏁
        uses: actions/checkout@v4

      - name: Setup Go 🐹
        uses: actions/setup-go@v4
        with:
          go-version: '1.22'

      - name: Build 
        run: |
          mkdir -p dist
          GOOS=js GOARCH=wasm go build -o dist/main.wasm main.go
          curl -L https://raw.githubusercontent.com/golang/go/master/misc/wasm/wasm_exec.js -o dist/wasm_exec.js
          cp index.html dist/ || echo "index.html not in root"
          cp -r rom dist/ || echo "rom folder not found in root"
      - name: Deploy 
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages