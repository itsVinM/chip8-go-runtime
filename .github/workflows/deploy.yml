name: Build and Deploy WASM

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.24'

      - name: Build
        run: |
          set -e
          mkdir -p stage
          GOOS=js GOARCH=wasm go build -o stage/main.wasm main.go
          cp $(go env GOROOT)/misc/wasm/wasm_exec.js stage/wasm_glue_v1.js
          cp dist/index.html stage/
          touch stage/.nojekyll
          ls -lh stage/

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: stage
          branch: gh-pages
          clean: true