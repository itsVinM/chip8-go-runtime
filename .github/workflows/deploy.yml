name: Build and Deploy WASM

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🏁
        uses: actions/checkout@v4

      - name: Setup Go 🐹
        uses: actions/setup-go@v4
        with:
          go-version: '1.22'

      - name: Build 🏗️
        run: |
          mkdir -p dist
          # Force build a fresh binary
          GOOS=js GOARCH=wasm go build -o dist/main.wasm main.go
          # Copy the WASM glue script
          cp $(go env GOROOT)/misc/wasm/wasm_exec.js dist/
          # Copy your assets
          cp index.html dist/
          # Copy the rom folder (ensure the name matches exactly!)
          cp -r rom dist/
      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages