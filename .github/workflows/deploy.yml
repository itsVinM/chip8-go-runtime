name: Build and Deploy WASM

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🏁
        uses: actions/checkout@v4

      - name: Setup Go 🐹
        uses: actions/setup-go@v4
        with:
          go-version: '1.24'

      - name: Build 🏗️
        run: |
          set -e
          mkdir -p stage
          
          # Build WASM
          GOOS=js GOARCH=wasm go build -o stage/main.wasm main.go
          
          # Get Glue Script
          curl -L https://raw.githubusercontent.com/golang/go/release-branch.go1.24/misc/wasm/wasm_exec.js -o stage/wasm_exec.js 
          
          # Copy HTML from dist
          cp dist/index.html stage/
          
          # PROVE IT: This will print the files in the Action log
          echo "Contents of deployment folder:"
          ls -R stage
      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: stage
          branch: gh-pages