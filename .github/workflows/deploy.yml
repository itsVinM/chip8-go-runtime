name: Build and Deploy WASM

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🏁
        uses: actions/checkout@v4

      - name: Setup Go 🐹
        uses: actions/setup-go@v4
        with:
          go-version: '1.22'

      - name: Build 🏗️
        run: |
          mkdir -p dist
          # Build the binary using the code in root
          GOOS=js GOARCH=wasm go build -o dist/main.wasm main.go
          # Copy necessary assets into the dist folder
          cp $(go env GOROOT)/misc/wasm/wasm_exec.js dist/
          cp index.html dist/
          # Copy the roms folder so the WASM can find them
          cp -r rom dist/ || echo "No rom folder found, skipping copy"

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages