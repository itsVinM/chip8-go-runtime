name: Build and Deploy WASM

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🏁
        uses: actions/checkout@v4

      - name: Setup Go 🐹
        uses: actions/setup-go@v4
        with:
          go-version: '1.22'

      - name: Build 
        run: |
          mkdir -p dist
        
          GOOS=js GOARCH=wasm go build -o dist/main.wasm main.go
          
          WASM_EXEC_PATH=$(go env GOROOT)/misc/wasm/wasm_exec.js
          cp "$WASM_EXEC_PATH" dist/
          
          
          cp index.html dist/
          cp -r rom dist/ || echo "No rom folder, skipping"
      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages